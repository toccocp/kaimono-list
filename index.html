<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#fbf3ee">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>買い物リスト</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<style>
:root{
  --bg:#fbf3ee;
  --card:#fffaf6;
  --ink:#5a4742;
  --sub:#a9968f;
  --line:#efe2d9;
  --accent:#d98c7d;
  --accent-deep:#c5705f;
  --accent-soft:#f7e2da;
  --gold:#c2a25c;
  /* 現在のタブ色（JSで差し替え） */
  --c:#d98c7d;
  --cd:#c5705f;
  --cs:#f7e2da;
  --cl:#8a6f66;
  --chip:#f4e9e2;
  --shadow:0 1px 2px rgba(150,110,95,.06),0 8px 22px rgba(150,110,95,.08);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0}
body{
  font-family:-apple-system,"Hiragino Sans","Hiragino Kaku Gothic ProN",sans-serif;
  background:radial-gradient(1200px 400px at 50% -120px,#fdeae2 0%,transparent 60%),var(--bg);
  color:var(--ink); line-height:1.55; padding-bottom:112px;
}
.mincho{font-family:"Hiragino Mincho ProN","YuMincho","Yu Mincho",serif}

header{
  position:sticky; top:0; z-index:20;
  background:rgba(251,243,238,.9); backdrop-filter:saturate(160%) blur(12px);
  border-bottom:1px solid var(--line); padding:max(14px,env(safe-area-inset-top)) 16px 10px;
}
.htop{display:flex; align-items:center; justify-content:space-between; gap:10px}
h1{
  font-family:"Hiragino Mincho ProN","YuMincho",serif;
  font-size:20px; font-weight:600; margin:0; letter-spacing:.1em; color:#7a5d54;
  display:flex; align-items:center; gap:9px;
}
h1 .orn{font-size:13px; color:var(--gold)}
.editbtn{
  font-size:12px; padding:6px 13px; border-radius:999px; border:1px solid var(--line);
  background:var(--card); color:var(--sub); cursor:pointer; transition:.15s; letter-spacing:.06em; white-space:nowrap;
}
.editbtn.on{background:var(--c); color:#fff; border-color:var(--c); box-shadow:0 3px 10px rgba(150,110,95,.28)}
.tabs{display:flex; gap:8px; overflow-x:auto; margin-top:11px; padding-bottom:4px; scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:none; font-size:13px; padding:7px 15px; border-radius:999px; border:1px solid var(--line);
  background:var(--chip); color:#8a6f66; white-space:nowrap; cursor:pointer; transition:.15s; position:relative;
}
.tab .n{
  display:inline-block; min-width:17px; margin-left:6px; font-size:10.5px; font-weight:700;
  border-radius:999px; padding:0 5px; line-height:17px; text-align:center; color:#fff;
}
.tab.on{color:#fff}
.tab.on .n{background:rgba(255,255,255,.3)}

main{padding:14px 14px 0; max-width:560px; margin:0 auto}
.memo{
  font-size:12px; color:var(--cd); background:var(--cs); border:1px solid transparent;
  border-radius:12px; padding:9px 12px; margin:0 0 13px; line-height:1.6; letter-spacing:.02em;
}
.memo .mi{margin-right:5px; opacity:.7}
.memo textarea{
  width:100%; border:0; background:transparent; font:inherit; color:var(--cd); outline:0; resize:vertical; min-height:44px;
}
.list{
  background:var(--card); border:1px solid var(--line); border-radius:18px;
  box-shadow:var(--shadow); overflow:hidden; border-top:3px solid var(--c);
}
.row{display:flex; align-items:center; gap:11px; padding:0 14px; border-bottom:1px solid var(--line)}
.row:last-child{border-bottom:0}
.row label{flex:1; display:flex; align-items:center; gap:11px; padding:13px 0; cursor:pointer; min-width:0}
.row input[type=checkbox]{position:absolute; opacity:0; pointer-events:none}
.box{
  flex:none; width:22px; height:22px; border-radius:7px; border:1.5px solid #e0cbc1; background:#fff;
  display:flex; align-items:center; justify-content:center; transition:.15s;
}
.box::after{content:"✓"; color:#fff; font-size:14px; font-weight:700; opacity:0; transform:scale(.6); transition:.15s}
.row input:checked + .box{background:var(--c); border-color:var(--cd)}
.row input:checked + .box::after{opacity:1; transform:none}
.nm{font-size:15px; color:#6b524b; overflow:hidden; text-overflow:ellipsis}
.row input:checked ~ .nm{color:var(--cd); font-weight:600}
.ctl{display:none; gap:4px; flex:none}
body.edit .ctl{display:flex}
body.edit .row label{cursor:default}
body.edit .box{opacity:.25}
.ctl button{
  width:30px; height:30px; border-radius:9px; border:1px solid var(--line); background:var(--chip);
  color:#9a7d74; font-size:13px; cursor:pointer; padding:0; line-height:1;
}
.ctl button.del{color:var(--accent-deep); background:#fbe8e2; border-color:#f2d6cd}
.adder{display:none; gap:8px; margin-top:12px}
body.edit .adder{display:flex}
.adder input{
  flex:1; font-size:16px; padding:12px 14px; border:1px solid var(--line); border-radius:13px;
  background:var(--card); color:var(--ink); outline:0;
}
.adder input:focus{border-color:var(--c)}
.adder button{
  flex:none; padding:0 18px; border:0; border-radius:13px; color:#fff; font-size:15px; font-weight:600;
  background:var(--c); cursor:pointer; letter-spacing:.06em;
}
.empty{text-align:center; color:var(--sub); padding:48px 20px; font-size:13.5px}
.empty .big{font-size:30px; display:block; margin-bottom:10px; opacity:.55}
.hint{font-size:11px; color:var(--sub); text-align:center; padding:16px 10px 0; letter-spacing:.04em; line-height:1.8}
.rebanner{
  display:none; background:#fff7e6; border:1px solid #f0d79a; border-radius:16px;
  padding:15px 16px 16px; margin-bottom:15px;
}
.rebanner.on{display:block}
.rebanner .rbt{font-family:"Hiragino Mincho ProN",serif; font-size:14.5px; color:#8a6a2f; margin-bottom:6px; letter-spacing:.05em}
.rebanner .rbd{font-size:12px; color:#a08a5e; line-height:1.7; margin:0 0 13px}
.rbbtns{display:flex; gap:9px}
.rbbtns button{flex:1; padding:12px; border-radius:12px; font-size:14px; font-weight:600; cursor:pointer; letter-spacing:.06em}
.rbbtns .yes{border:0; background:#d98c7d; color:#fff}
.rbbtns .no{border:1px solid #e6d3a8; background:#fffdf7; color:#a08a5e}

.backup{
  display:none; margin-top:30px; background:var(--card); border:1px solid var(--line);
  border-radius:16px; padding:15px 16px 16px;
}
body.edit .backup{display:block}
.backup .bt{font-family:"Hiragino Mincho ProN",serif; font-size:13.5px; color:#7a5d54; letter-spacing:.08em; margin-bottom:7px}
.backup .bd{font-size:11.5px; color:var(--sub); line-height:1.75; margin:0 0 12px}
.backup .bd b{color:#8a6f66}
.bmain{
  width:100%; padding:12px; border:1px solid #ddc7bc; border-radius:12px; background:var(--chip);
  color:#7f6252; font-size:14px; font-weight:600; cursor:pointer; letter-spacing:.06em;
}
.bsub{
  width:100%; margin-top:9px; padding:10px; border:1px solid var(--line); border-radius:11px;
  background:var(--bg); color:#8a6f66; font-size:13px; cursor:pointer; letter-spacing:.05em;
}
.qrwrap{display:none; text-align:center; margin-top:14px}
.qrwrap.on{display:block}
#qrcode{display:block; background:#fff; padding:10px; border-radius:14px; box-shadow:var(--shadow)}
#qrcode img, #qrcode canvas{display:block; width:100%; height:auto; image-rendering:pixelated}
.qrnote{font-size:11.5px; color:var(--sub); line-height:1.7; margin:11px 2px 0}
.fallback{margin-top:14px}
.fallback summary{font-size:11.5px; color:var(--sub); cursor:pointer; letter-spacing:.04em}
.backup textarea{
  width:100%; margin-top:9px; min-height:64px; font-size:12px; font-family:ui-monospace,Menlo,monospace;
  border:1px solid var(--line); border-radius:11px; padding:9px 11px; background:var(--bg); color:var(--ink);
  outline:0; resize:vertical;
}
.backup textarea:focus{border-color:#c9ab9d}
.dangerwrap{display:none; padding:22px 4px 0; text-align:center}
body.edit .dangerwrap{display:block}
.danger{font-size:11.5px; color:#b99a91; background:none; border:0; text-decoration:underline; cursor:pointer}

.bar{
  position:fixed; left:0; right:0; bottom:0; z-index:30;
  background:rgba(251,243,238,.93); backdrop-filter:saturate(160%) blur(12px);
  border-top:1px solid var(--line);
  padding:11px 16px max(13px,env(safe-area-inset-bottom));
  display:flex; align-items:center; gap:12px;
}
.bar .cnt{font-size:12.5px; color:var(--sub); letter-spacing:.05em; flex:none}
.bar .cnt b{font-family:"Hiragino Mincho ProN",serif; font-size:19px; color:#c5705f; margin:0 3px}
.go{
  flex:1; padding:14px; border:0; border-radius:14px; color:#fff; font-size:15.5px; font-weight:600;
  background:#d98c7d; cursor:pointer; letter-spacing:.1em;
  box-shadow:0 5px 15px rgba(217,140,125,.35);
}
.go:disabled{background:#e6d5cd; color:#fff; box-shadow:none; cursor:default}

.result{position:fixed; inset:0; z-index:50; background:var(--bg); overflow-y:auto; display:none}
.result.open{display:block}
.rsheet{max-width:560px; margin:0 auto; padding:max(20px,env(safe-area-inset-top)) 18px 130px}
.rcard{
  background:var(--card); border:1px solid var(--line); border-radius:20px; box-shadow:var(--shadow);
  padding:24px 22px 26px; position:relative; overflow:hidden;
}
.rcard::before{
  content:""; position:absolute; inset:9px; border:1px solid #f0e0d6; border-radius:13px; pointer-events:none;
}
.rhead{text-align:center; margin-bottom:20px; position:relative}
.rhead .rt{
  font-family:"Hiragino Mincho ProN","YuMincho",serif; font-size:20px; letter-spacing:.22em;
  color:#7a5d54; margin:0 0 6px; font-weight:600;
}
.rhead .rd{font-size:11.5px; color:var(--sub); letter-spacing:.14em}
.rhead .rule{width:56px; height:1px; background:var(--gold); margin:12px auto 0; opacity:.55}
.ritems{margin:0; padding:0; list-style:none}
.ritems li{
  display:flex; align-items:baseline; gap:10px; padding:9px 2px; border-bottom:1px dashed #f0e2da;
  font-size:15.5px; color:#5f4842;
}
.ritems li:last-child{border-bottom:0}
.ritems li .no{
  font-family:"Hiragino Mincho ProN",serif; font-size:11px; flex:none; width:20px; letter-spacing:.05em;
}
.rbar{
  position:fixed; left:0; right:0; bottom:0; z-index:60;
  background:rgba(251,243,238,.93); backdrop-filter:blur(12px); border-top:1px solid var(--line);
  padding:11px 16px max(13px,env(safe-area-inset-bottom)); display:flex; gap:10px; max-width:560px; margin:0 auto;
}
.rbar button{
  flex:1; padding:13px; border-radius:13px; font-size:14.5px; font-weight:600; cursor:pointer; letter-spacing:.08em;
}
.rbar .back{border:1px solid var(--line); background:var(--card); color:#8a6f66}
.rbar .clear{border:0; background:#d98c7d; color:#fff}
.toast{
  position:fixed; left:50%; bottom:96px; transform:translateX(-50%) translateY(10px); z-index:80;
  background:rgba(90,60,50,.92); color:#fff; font-size:13px; padding:10px 18px; border-radius:999px;
  opacity:0; pointer-events:none; transition:.25s; letter-spacing:.05em;
}
.toast.on{opacity:1; transform:translateX(-50%)}
</style>
</head>
<body>

<header>
  <div class="htop">
    <h1><span class="orn">❋</span>買い物リスト</h1>
    <button class="editbtn" id="editBtn">リストを編集</button>
  </div>
  <div class="tabs" id="tabs"></div>
</header>

<main>
  <div class="rebanner" id="restoreBanner">
    <div class="rbt">📦 バックアップが見つかりました</div>
    <p class="rbd" id="restoreInfo"></p>
    <div class="rbbtns">
      <button class="yes" id="doRestore">復元する</button>
      <button class="no" id="cancelRestore">やめる</button>
    </div>
  </div>
  <div class="memo" id="memoBox"></div>
  <div class="list" id="list"></div>
  <div class="adder">
    <input id="addInput" type="text" placeholder="追加するものを入力" enterkeyhint="done">
    <button id="addBtn">追加</button>
  </div>
  <div class="hint" id="hint">買い足すものにチェック → 「買い物リストを作る」</div>
  <div class="backup" id="backup">
    <div class="bt">📦 バックアップ・引き継ぎ</div>
    <p class="bd">機種変更でリストを移すとき。新しいスマホの<b>カメラ</b>で下のQRを写すだけです。</p>
    <button class="bmain" id="qrBtn">バックアップQRを表示</button>
    <div class="qrwrap" id="qrWrap">
      <div id="qrcode"></div>
      <p class="qrnote">新しいスマホのカメラでこのQRを写す → 出たリンクをタップ → 「復元する」</p>
      <button class="bsub" id="copyBtn">リンクをコピー</button>
    </div>
    <details class="fallback">
      <summary>QRが読めないとき（コードで復元）</summary>
      <textarea id="bkText" placeholder="コピーしたリンク／コードを貼り付け"></textarea>
      <button class="bsub" id="impBtn">このコードで復元</button>
    </details>
  </div>
  <div class="dangerwrap"><button class="danger" id="resetBtn">最初のリストに戻す</button></div>
</main>

<div class="bar">
  <div class="cnt"><b id="cnt">0</b>品</div>
  <button class="go" id="goBtn" disabled>買い物リストを作る</button>
</div>

<div class="result" id="result">
  <div class="rsheet">
    <div class="rcard">
      <div class="rhead">
        <p class="rt mincho">お買い物リスト</p>
        <div class="rd" id="rdate"></div>
        <div class="rule"></div>
      </div>
      <ul class="ritems" id="ritems"></ul>
    </div>
  </div>
  <div class="rbar">
    <button class="back" id="backBtn">もどる</button>
    <button class="clear" id="clearBtn">買い終わった</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="qrcode.min.js"></script>
<script>
const DEFAULTS = [
  { key:"shokuzai", name:"食材",
    memo:"生鮮は消費期限注意。お肉は月曜〜水曜の買い物で2品まで。",
    items:["じゃがいも","人参","玉ねぎ","きゅうり","もやし","トマト","かぼちゃ",
           "豚こま","合いびき肉","鶏ひき肉","豆腐",
           "卵","牛乳","バター","ピザ用チーズ","ベーコン","ハム","ウインナー","油揚げ"] },
  { key:"shokuhin", name:"食品", memo:"",
    items:["パスタ","マカロニ","ホットケーキミックス","ひじき","鰹節","パン粉","薄力粉","ラーメン",
           "パスタソース（バジル）","パスタソース（チーズ）","パスタソース（ボロネーゼ）","パスタソース（ミートソース）",
           "麻婆豆腐の素","スープの素（コーン）","スープの素（わかめ）"] },
  { key:"reito", name:"冷凍食品", memo:"",
    items:["ミックスベジタブル","ブロッコリー","刻みネギ","餃子","焼豚チャーハン"] },
  { key:"chomiryo", name:"調味料", memo:"買う頻度は低め。切らす前にチェック。",
    items:["醤油","みりん","料理酒","塩コショウ","黒こしょう","コンソメ","サラダ油","ごま油","ウスターソース","ケチャップ","マヨネーズ"] },
  { key:"nichiyo", name:"日用品", memo:"",
    items:["ティッシュペーパー","トイレットペーパー","指定ゴミ袋","洗濯用洗剤（詰め替え）","ワイドハイターEX（詰め替え）",
           "食器用洗剤（詰め替え）","トイレスタンプ（詰め替え）","バスマジックリン（詰め替え）","カビキラー（付け替え）",
           "キッチン泡ハイター（付け替え）","キッチンブリーチ","キッチンペーパー","クッキングシート","アルミホイル",
           "サランラップ","排水口ネット","掃除機紙パック（各社共通）","食器用スポンジ","牛乳石鹸",
           "こども用歯磨き粉（ぶどう）","こども用歯磨き粉（いちご）","クリアクリーン","こども用シャンプー",
           "電池（単4）","電池（単3）","電池（単2）","電池（単1）","電池（ボタン式）"] }
];

// タブごとの色（c:メイン / cd:濃い文字 / cs:淡い背景）
const COLORS = {
  shokuzai: { c:"#8fae86", cd:"#5f7d57", cs:"#e8f0e4" },  /* 食材 = セージグリーン */
  shokuhin: { c:"#c9a961", cd:"#94762f", cs:"#f6eed9" },  /* 食品 = ハニーゴールド */
  reito:    { c:"#8bacc4", cd:"#5b7f99", cs:"#e4eef5" },  /* 冷凍食品 = パウダーブルー */
  chomiryo: { c:"#ab95bd", cd:"#7c6491", cs:"#efe8f4" },  /* 調味料 = ラベンダー */
  nichiyo:  { c:"#c0a794", cd:"#8a6d5b", cs:"#f2e9e1" }   /* 日用品 = カフェオレベージュ */
};
const FALLBACK = { c:"#d98c7d", cd:"#b9604d", cs:"#f7e2da" };
const colorOf = t => COLORS[t.key] || FALLBACK;

const KEY = "kaimono.v1";
let data, cur = 0, editing = false;

function freshData(){
  return DEFAULTS.map(t => ({
    key:t.key, name:t.name, memo:t.memo,
    items:t.items.map(n => ({ id:uid(), name:n, on:false }))
  }));
}
function uid(){ return Math.random().toString(36).slice(2,9) }
function save(){ localStorage.setItem(KEY, JSON.stringify(data)) }
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(raw){ const d = JSON.parse(raw); if(Array.isArray(d) && d.length) return migrate(d) }
  }catch(e){}
  return freshData();
}
// 保存済みデータの手直し
function migrate(d){
  d.forEach(t => (t.items || []).forEach(i => {
    i.name = String(i.name).replace("（季節による）", "").trim();
  }));
  return d;
}

const $ = s => document.querySelector(s);
const tabsEl = $("#tabs"), listEl = $("#list"), memoEl = $("#memoBox");

function checkedCount(){ return data.reduce((s,t) => s + t.items.filter(i=>i.on).length, 0) }

function renderTabs(){
  tabsEl.innerHTML = "";
  data.forEach((t,i) => {
    const n = t.items.filter(x=>x.on).length;
    const col = colorOf(t);
    const b = document.createElement("button");
    b.className = "tab" + (i===cur ? " on" : "");
    b.innerHTML = t.name + (n ? '<span class="n" style="background:'+col.c+'">'+n+'</span>' : '');
    if(i === cur){
      b.style.background = col.c;
      b.style.borderColor = col.c;
      b.style.boxShadow = "0 3px 10px rgba(150,110,95,.3)";
    } else {
      b.style.background = col.cs;
      b.style.borderColor = col.cs;
      b.style.color = col.cd;
    }
    b.onclick = () => { cur = i; render() };
    tabsEl.appendChild(b);
  });
  // 現在のタブ色をページ全体へ反映
  const cc = colorOf(data[cur]);
  const rs = document.documentElement.style;
  rs.setProperty("--c", cc.c);
  rs.setProperty("--cd", cc.cd);
  rs.setProperty("--cs", cc.cs);
}

function renderMemo(){
  const t = data[cur];
  if(editing){
    memoEl.style.display = "block";
    memoEl.innerHTML = "";
    const ta = document.createElement("textarea");
    ta.value = t.memo || "";
    ta.placeholder = "このタブのメモ（空欄でもOK）";
    ta.oninput = () => { t.memo = ta.value; save() };
    memoEl.appendChild(ta);
  } else if(t.memo && t.memo.trim()){
    memoEl.style.display = "block";
    memoEl.innerHTML = '<span class="mi">❋</span>' + t.memo.replace(/</g,"&lt;");
  } else {
    memoEl.style.display = "none";
  }
}

function renderList(){
  const t = data[cur];
  listEl.innerHTML = "";
  if(!t.items.length){
    listEl.innerHTML = '<div class="empty"><span class="big">❋</span>まだ何もありません<br>「リストを編集」から追加できます</div>';
    return;
  }
  t.items.forEach((it, idx) => {
    const row = document.createElement("div");
    row.className = "row";

    const lb = document.createElement("label");
    const cb = document.createElement("input");
    cb.type = "checkbox"; cb.checked = it.on;
    cb.onchange = () => { it.on = cb.checked; save(); renderTabs(); renderCount() };
    const box = document.createElement("span"); box.className = "box";
    const nm = document.createElement("span"); nm.className = "nm"; nm.textContent = it.name;
    lb.append(cb, box, nm);

    const ctl = document.createElement("div");
    ctl.className = "ctl";
    const up = document.createElement("button"); up.textContent = "↑";
    up.onclick = () => move(idx, -1);
    const dn = document.createElement("button"); dn.textContent = "↓";
    dn.onclick = () => move(idx, 1);
    const del = document.createElement("button"); del.textContent = "✕"; del.className = "del";
    del.onclick = () => {
      if(confirm("「" + it.name + "」を削除しますか？")){
        t.items.splice(idx,1); save(); render();
      }
    };
    ctl.append(up, dn, del);

    if(editing){
      const ren = document.createElement("button"); ren.textContent = "✎";
      ren.onclick = () => {
        const v = prompt("名前を変更", it.name);
        if(v && v.trim()){ it.name = v.trim(); save(); render() }
      };
      ctl.insertBefore(ren, up);
      lb.onclick = e => e.preventDefault();
    }

    row.append(lb, ctl);
    listEl.appendChild(row);
  });
}

function move(idx, d){
  const arr = data[cur].items, to = idx + d;
  if(to < 0 || to >= arr.length) return;
  [arr[idx], arr[to]] = [arr[to], arr[idx]];
  save(); render();
}

function renderCount(){
  const n = checkedCount();
  $("#cnt").textContent = n;
  $("#goBtn").disabled = n === 0;
}

function render(){ renderTabs(); renderMemo(); renderList(); renderCount() }

$("#editBtn").onclick = () => {
  editing = !editing;
  document.body.classList.toggle("edit", editing);
  $("#editBtn").classList.toggle("on", editing);
  $("#editBtn").textContent = editing ? "編集おわり" : "リストを編集";
  $("#hint").textContent = editing
    ? "✎で名前変更／↑↓で並べ替え／✕で削除。下から追加できます。"
    : "買い足すものにチェック → 「買い物リストを作る」";
  render();
};

function addItem(){
  const inp = $("#addInput"), v = inp.value.trim();
  if(!v) return;
  data[cur].items.push({ id:uid(), name:v, on:false });
  inp.value = ""; save(); render();
  listEl.lastElementChild.scrollIntoView({ block:"center", behavior:"smooth" });
  toast("「" + v + "」を追加しました");
}
$("#addBtn").onclick = addItem;
$("#addInput").addEventListener("keydown", e => { if(e.key === "Enter") addItem() });

// ── バックアップ・引き継ぎ（QR） ──
// QRに収めるため、チェック状態やIDは省いた小さな形にしてから圧縮する
function toCompact(){
  return data.map(t => [t.key, t.name, t.memo || "", t.items.map(i => i.name)]);
}
function fromCompact(c){
  return c.map(row => {
    const [key, name, memo, names] = row;
    return { key, name, memo: memo || "", items: (names||[]).map(n => ({ id:uid(), name:String(n), on:false })) };
  });
}
function compactValid(c){
  return Array.isArray(c) && c.length > 0 && c.every(r =>
    Array.isArray(r) && typeof r[1] === "string" && Array.isArray(r[3]));
}

const b64url = {
  enc: bytes => btoa(String.fromCharCode(...bytes)).replace(/\+/g,"-").replace(/\//g,"_").replace(/=+$/,""),
  dec: s => {
    s = s.replace(/-/g,"+").replace(/_/g,"/");
    const bin = atob(s + "=".repeat((4 - s.length % 4) % 4));
    return Uint8Array.from(bin, ch => ch.charCodeAt(0));
  }
};

async function makeCode(){
  const json = JSON.stringify(toCompact());
  const raw = new TextEncoder().encode(json);
  if(typeof CompressionStream === "function"){
    try{
      const cs = new CompressionStream("deflate-raw");
      const w = cs.writable.getWriter(); w.write(raw); w.close();
      const buf = new Uint8Array(await new Response(cs.readable).arrayBuffer());
      return "z" + b64url.enc(buf);
    }catch(e){}
  }
  return "j" + b64url.enc(raw);
}
async function readCode(code){
  const kind = code[0], body = code.slice(1);
  const bytes = b64url.dec(body);
  let json;
  if(kind === "z"){
    const ds = new DecompressionStream("deflate-raw");
    const w = ds.writable.getWriter(); w.write(bytes); w.close();
    json = await new Response(ds.readable).text();
  } else if(kind === "j"){
    json = new TextDecoder().decode(bytes);
  } else {
    throw new Error("unknown");
  }
  return JSON.parse(json);
}
function backupURL(code){ return location.origin + location.pathname + "#d=" + code }
// リンクでもコードだけでも受け取れるように
function extractCode(s){
  s = (s || "").trim();
  const m = s.match(/[#&?]d=([^&\s]+)/) || s.match(/^d=([^&\s]+)/);
  return m ? m[1] : s;
}

let backupUrl = "";
$("#qrBtn").onclick = async () => {
  const el = $("#qrcode");
  el.innerHTML = "";
  $("#qrWrap").classList.add("on");
  try{
    backupUrl = backupURL(await makeCode());
    if(typeof QRCode === "undefined") throw new Error("lib");
    // データ量が多いのでQRの目が細かい。読み取りやすいよう大きめに描く
    new QRCode(el, { text:backupUrl, width:600, height:600, correctLevel:QRCode.CorrectLevel.L });
  }catch(e){
    el.innerHTML = '<div style="font-size:12px;color:#c0392b;max-width:220px;line-height:1.7">QRを作れませんでした。下の「リンクをコピー」か「コードで復元」を使ってください。</div>';
  }
};

$("#copyBtn").onclick = async () => {
  if(!backupUrl) return;
  try{
    await navigator.clipboard.writeText(backupUrl);
    toast("リンクをコピーしました");
  }catch(e){
    $("#bkText").value = backupUrl;
    $("#bkText").select();
    toast("下の欄の文字を長押ししてコピーしてね");
  }
};

$("#impBtn").onclick = async () => {
  const v = $("#bkText").value.trim();
  if(!v){ toast("リンクかコードを貼り付けてください"); return }
  let c;
  try{ c = await readCode(extractCode(v)) }
  catch(e){ alert("コードを読み取れませんでした。途中で切れていないか確認して、コピーし直してください。"); return }
  if(!compactValid(c)){ alert("バックアップの形式が違うようです。"); return }
  if(!confirm("今のリストを、このバックアップの内容で置きかえます。よろしいですか？")) return;
  applyRestore(c);
};

function applyRestore(c){
  data = migrate(fromCompact(c));
  cur = 0; save(); render();
  $("#bkText").value = "";
  history.replaceState(null, "", location.pathname);
  toast("リストを復元しました");
  window.scrollTo(0,0);
}

// QRから開いたときの復元バナー
let pending = null;
async function checkHashRestore(){
  const m = (location.hash || "").match(/[#&]d=([^&]+)/);
  if(!m) return;
  // 復元バナーを確実に見せる（前回のスクロール位置に戻さない）
  if("scrollRestoration" in history) history.scrollRestoration = "manual";
  try{
    const c = await readCode(m[1]);
    if(!compactValid(c)) return;
    pending = c;
    const n = c.reduce((s,r) => s + r[3].length, 0);
    $("#restoreInfo").textContent =
      "このデータでリストを復元しますか？（" + c.length + "タブ・" + n + "品）いまの内容は上書きされます。";
    $("#restoreBanner").classList.add("on");
    window.scrollTo(0,0);
  }catch(e){ console.error("restore-check", e && e.name, e && e.message) }
}
$("#doRestore").onclick = () => {
  if(pending) applyRestore(pending);
  pending = null;
  $("#restoreBanner").classList.remove("on");
};
$("#cancelRestore").onclick = () => {
  pending = null;
  $("#restoreBanner").classList.remove("on");
  history.replaceState(null, "", location.pathname);
};

$("#resetBtn").onclick = () => {
  if(confirm("リストを最初の状態に戻します。追加・削除した内容は消えますが、よろしいですか？")){
    data = freshData(); cur = 0; save(); render();
  }
};

function toast(msg){
  const t = $("#toast");
  t.textContent = msg; t.classList.add("on");
  clearTimeout(toast._t);
  toast._t = setTimeout(() => t.classList.remove("on"), 1800);
}

$("#goBtn").onclick = () => {
  const picked = [];
  data.forEach(t => t.items.forEach(i => { if(i.on) picked.push({ name:i.name, col:colorOf(t) }) }));
  const ul = $("#ritems");
  ul.innerHTML = "";
  picked.forEach((p,i) => {
    const li = document.createElement("li");
    li.innerHTML =
      '<span class="no" style="color:' + p.col.cd + '">' + String(i+1).padStart(2,"0") + '</span>' +
      '<span>' + p.name.replace(/</g,"&lt;") + '</span>';
    ul.appendChild(li);
  });
  const d = new Date();
  const w = "日月火水木金土"[d.getDay()];
  $("#rdate").textContent = d.getFullYear() + "." + String(d.getMonth()+1).padStart(2,"0") + "." + String(d.getDate()).padStart(2,"0") + "（" + w + "）";
  $("#result").classList.add("open");
  window.scrollTo(0,0);
};

$("#backBtn").onclick = () => $("#result").classList.remove("open");
$("#clearBtn").onclick = () => {
  if(!confirm("チェックを全部はずします。よろしいですか？")) return;
  data.forEach(t => t.items.forEach(i => i.on = false));
  save(); render();
  $("#result").classList.remove("open");
  toast("おつかれさま！チェックをリセットしました");
};

data = load();
render();
checkHashRestore();
</script>
</body>
</html>
